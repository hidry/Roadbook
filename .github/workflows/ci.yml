name: CI

on:
  push:
    branches: [main, claude/plane-project-mvp-6I6WO]
  pull_request:

jobs:
  quality:
    name: Typecheck · Test · Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Lint
        run: npm run lint

  rls:
    name: RLS tenant-isolation proof
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase (applies migrations)
        run: supabase start
      - name: Run RLS isolation test
        run: |
          set -a
          eval "$(supabase status -o env | sed \
            -e 's/^API_URL=/SUPABASE_URL=/' \
            -e 's/^ANON_KEY=/SUPABASE_ANON_KEY=/' \
            -e 's/^SERVICE_ROLE_KEY=/SUPABASE_SERVICE_ROLE_KEY=/')"
          set +a
          npm run rls:test
      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
