name: E2E (Web)

on:
  push:
    branches: [main, claude/e2e-tests]
  pull_request:
  workflow_dispatch: {}

jobs:
  web:
    name: Playwright web E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase (applies migrations)
        run: supabase start

      - name: Export web bundle with local Supabase env baked in
        run: |
          set -a
          eval "$(supabase status -o env | sed \
            -e 's/^API_URL=/EXPO_PUBLIC_SUPABASE_URL=/' \
            -e 's/^ANON_KEY=/EXPO_PUBLIC_SUPABASE_ANON_KEY=/')"
          set +a
          npm run web:export

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run web E2E
        run: npm run e2e:web

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
