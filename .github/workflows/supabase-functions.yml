name: Supabase functions

# Deploys supabase/functions/** to the linked Cloud project (e.g. r2-presign).
#
# Edge Functions are NOT deployed by `supabase db push` (that only applies DB
# migrations) — this workflow handles them separately, mirroring
# supabase-migrate.yml.
#
# Triggers: push to `main` that touches a function file (the repo is the source
# of truth), plus manual dispatch. To deploy from a different branch, either
# change the branch under `on.push.branches` below, or use "Run workflow" on the
# Actions tab and pick the branch there (workflow_dispatch lets you choose any
# ref). Not run on PR branches — functions land only once merged.
on:
  push:
    branches: [main]
    paths: ['supabase/functions/**']
  workflow_dispatch: {}

permissions:
  contents: read

# Never let two deploys race against the same project.
concurrency:
  group: supabase-functions
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Edge Functions to Supabase Cloud
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # Deploys every function under supabase/functions/. The R2 credentials are
      # set as project secrets in the dashboard (R2_ACCOUNT_ID, R2_ACCESS_KEY_ID,
      # R2_SECRET_ACCESS_KEY, R2_BUCKET, R2_PUBLIC_BASE_URL) — not needed here.
      - name: Deploy functions
        run: supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
