name: Android build · GitHub runner (no EAS quota)

# Builds a standalone, installable Android app ON THE GITHUB RUNNER via
# `eas build --local`. The compile happens on GitHub's machine instead of Expo's
# servers, so it does NOT consume the limited free EAS *cloud* build quota
# (Free tier = 15 Android builds/month). The finished artifact is uploaded to
# the workflow run — download it from the run's "Artifacts" section and install.
#
# It still reuses everything from eas.json: the build profile, the EXPO_PUBLIC_*
# environment variables hosted on expo.dev (scoped to the profile's `environment`)
# and the Android keystore stored in EAS credentials — all fetched via the
# EXPO_TOKEN repo secret. The result is therefore a properly signed build.
#
# Trade-off vs the cloud workflow: this spends GitHub Actions minutes instead of
# EAS build credits. Public repos: unlimited free minutes. Private repos: 2,000
# free Linux minutes/month, and an Android build takes ~20–40 min.
#
# MANUAL ONLY (workflow_dispatch) — does not run on push/PR.
on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        type: choice
        options: [preview, production]
        default: preview

permissions:
  contents: read

jobs:
  build:
    name: Build on runner (eas --local)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # JDK for the Gradle/Android compile (the Android SDK is preinstalled on
      # ubuntu-latest; eas --local wires it up).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      # production → .aab (store bundle); everything else → installable .apk.
      - name: Build on the runner (no EAS cloud quota)
        run: |
          if [ "${{ inputs.profile }}" = "production" ]; then ext=aab; else ext=apk; fi
          eas build \
            --platform android \
            --profile "${{ inputs.profile }}" \
            --local \
            --non-interactive \
            --output "$GITHUB_WORKSPACE/roadbook-${{ inputs.profile }}.$ext"
      - uses: actions/upload-artifact@v4
        with:
          name: roadbook-android-${{ inputs.profile }}
          path: roadbook-${{ inputs.profile }}.*
          if-no-files-found: error
          retention-days: 14
