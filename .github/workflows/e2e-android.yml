name: E2E (Android)

# Stage 2: native device-like E2E on an Android emulator (KVM is only available
# on GitHub-hosted runners, not in dev containers). Heavier/slower than the web
# E2E. Runs on PRs (to iterate), on push to main, nightly, and on demand.
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *' # nightly
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write # post failure diagnostics as a PR comment

jobs:
  android:
    name: Maestro on Android emulator
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ANDROID_SYSTEM_IMAGE: 'system-images;android-30;google_apis;x86_64'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci

      # Caches ~/.gradle (dependencies + Gradle dist + build cache) across runs.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The emulator needs writable /dev/kvm on ubuntu-latest.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Skip the ~20-min build when the app inputs are unchanged (e.g. when only
      # the workflow/emulator step changed): restore the prebuilt APK keyed on a
      # hash of everything that affects it. The APK is cached even if a later
      # step (Maestro) fails, so emulator/Maestro iterations don't rebuild.
      - name: Cache built APK
        id: apk-cache
        uses: actions/cache@v4
        with:
          path: android/app/build/outputs/apk/release/app-release.apk
          key: apk-x86_64-${{ hashFiles('package-lock.json', 'app.json', 'metro.config.js', 'src/**', 'assets/**') }}

      # Generate the native android/ project from app.json + config plugins.
      - name: Prebuild Android
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --no-install 2>&1 | tee prebuild.log

      # Release variant bundles the JS (no Metro) and is signed with the debug
      # keystore by the Expo/RN template (no secrets). Build only the emulator's
      # ABI (x86_64), skip lint, and use the Gradle build cache for speed.
      - name: Build release APK (x86_64 only)
        if: steps.apk-cache.outputs.cache-hit != 'true'
        run: ./gradlew assembleRelease -PreactNativeArchitectures=x86_64 -x lintVitalRelease --build-cache 2>&1 | tee ../android-build.log
        working-directory: android

      - name: Install Maestro
        run: |
          { curl -fsSL "https://get.maestro.mobile.dev" | bash; } 2>&1 | tee maestro-install.log
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Install emulator system image
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "platform-tools" "emulator" "$ANDROID_SYSTEM_IMAGE" 2>&1 | tee emulator-setup.log

      # Boot the emulator manually so all output is captured (the action hides
      # boot errors in the unreadable runner log). The whole step is tee'd into
      # boot-step.log so any failure (e.g. a tool not on PATH) is visible.
      - name: Boot emulator and run Maestro
        run: |
          exec > >(tee boot-step.log) 2>&1
          set -x
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/emulator:$PATH"
          ls -la /dev/kvm || echo "NO /dev/kvm"
          emulator -accel-check || true
          echo "no" | avdmanager create avd -n e2e -k "$ANDROID_SYSTEM_IMAGE" -d pixel --force
          nohup emulator -avd e2e \
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -accel on -wipe-data \
            > emulator-boot.log 2>&1 &
          # Fail fast (with the boot log) instead of hanging until the job timeout.
          if ! timeout 420 adb wait-for-device; then
            echo "::error::emulator did not come online within 420s"
            echo "==== emulator-boot.log ===="; cat emulator-boot.log || true
            exit 1
          fi
          if ! timeout 300 bash -c 'until [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" = "1" ]; do sleep 3; done'; then
            echo "::error::emulator boot did not complete within 300s"
            echo "==== emulator-boot.log ===="; cat emulator-boot.log || true
            adb devices || true
            exit 1
          fi
          adb shell input keyevent 82 || true
          touch maestro-output.log
          adb install -r android/app/build/outputs/apk/release/app-release.apk 2>&1 | tee -a maestro-output.log
          maestro test .maestro 2>&1 | tee -a maestro-output.log

      - name: Post failure diagnostics as PR comment
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tail = (file, n) => {
              try { return fs.readFileSync(file, 'utf8').split('\n').slice(-n).join('\n'); }
              catch { return '(no ' + file + ')'; }
            };
            const body = [
              '### ⚠️ Android E2E failed — diagnostics', '',
              '**Maestro output (tail):**',
              '```', tail('maestro-output.log', 120), '```',
              '<details><summary>boot step (tail)</summary>',
              '', '```', tail('boot-step.log', 60), '```', '</details>',
              '<details><summary>emulator boot (tail)</summary>',
              '', '```', tail('emulator-boot.log', 60), '```', '</details>',
              '<details><summary>emulator setup (tail)</summary>',
              '', '```', tail('emulator-setup.log', 25), '```', '</details>',
              '<details><summary>maestro install (tail)</summary>',
              '', '```', tail('maestro-install.log', 15), '```', '</details>',
              '<details><summary>gradle build (tail)</summary>',
              '', '```', tail('android-build.log', 40), '```', '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-logs
          path: |
            *.log
            ~/.maestro/tests
          retention-days: 7
          if-no-files-found: ignore
