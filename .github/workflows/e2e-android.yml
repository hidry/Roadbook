name: E2E (Android)

# Stage 2: native device-like E2E on an Android emulator (KVM is only available
# on GitHub-hosted runners, not in dev containers). Heavier/slower than the web
# E2E, so it does NOT gate every push the same way — but it runs on PRs (to
# iterate), on push to main, nightly, and on demand.
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *' # nightly
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write # post failure diagnostics as a PR comment

jobs:
  android:
    name: Maestro on Android emulator
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci

      # Generate the native android/ project from app.json + config plugins
      # (expo-sqlite, expo-image-picker/-media-library, MapLibre, …).
      - name: Prebuild Android
        run: npx expo prebuild --platform android --no-install 2>&1 | tee prebuild.log

      # Release variant: JS is bundled into the APK (no Metro needed) and the
      # Expo/RN template signs release with the debug keystore, so the APK is
      # installable without any signing secrets.
      - name: Build release APK
        run: ./gradlew assembleRelease 2>&1 | tee ../android-build.log
        working-directory: android

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb install -r android/app/build/outputs/apk/release/app-release.apk
            maestro test .maestro 2>&1 | tee maestro-output.log

      - name: Post failure diagnostics as PR comment
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tail = (file, n) => {
              try { return fs.readFileSync(file, 'utf8').split('\n').slice(-n).join('\n'); }
              catch { return '(no ' + file + ')'; }
            };
            const body = [
              '### ⚠️ Android E2E failed — diagnostics',
              '',
              '**Maestro output (tail):**',
              '```', tail('maestro-output.log', 120), '```',
              '<details><summary>gradle build (tail)</summary>',
              '', '```', tail('android-build.log', 60), '```', '</details>',
              '<details><summary>prebuild (tail)</summary>',
              '', '```', tail('prebuild.log', 30), '```', '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-output
          path: |
            maestro-output.log
            ~/.maestro/tests
          retention-days: 7
          if-no-files-found: ignore
